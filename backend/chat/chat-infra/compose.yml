services:
  redis:
    build:
      context: ./redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    container_name: chat-redis

  scylla:
    build:
      context: ./scylla
    restart: always
    ports:
      - "9042:9042"
    volumes:
      - ./scylla-data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh scylla 9042 -e 'describe keyspaces' > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    hostname: scylla
    container_name: chat-scylla

  scylla-init:
    image: scylladb/scylla:2025.1
    depends_on:
      scylla:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for ScyllaDB...'
      until cqlsh scylla 9042 -e 'describe cluster' > /dev/null 2>&1; do sleep 2; done
      echo 'Running migrations...'
      SCYLLA_HOST=scylla SCYLLA_PORT=9042 /migrate.sh
      "
    volumes:
      - ./scylla/migrate.sh:/migrate.sh
      - ./scylla/migrations:/migrations
    container_name: chat-scylla-init
